services:
  postgres:
    image: postgres:16-alpine
    container_name: snakeloader-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-snakeloader}
      # Read from backend/.env (compose auto-loads it). Falls back to a throwaway
      # local-only default so `docker compose up` still works standalone. Never
      # put a real password here — set DB_PASSWORD in backend/.env.
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_local_dev}
      POSTGRES_DB: ${DB_NAME:-snakeloader_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: snakeloader-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
