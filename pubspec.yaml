name: ssvid
description: "ssvid - Video Downloader powered by yt-dlp"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.3.7+12

environment:
  sdk: ^3.7.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # Rust Bridge
  flutter_rust_bridge: ^2.0.0
  ffi: ^2.1.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Database
  drift: ^2.22.0
  sqlite3: ^2.4.8
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5
  path: ^1.9.0

  # Media Player
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

  # HTTP & Networking
  http: ^1.2.2
  dio: ^5.4.0
  connectivity_plus: ^6.1.1

  # Logging
  logger: ^2.4.0

  # Localization
  easy_localization: ^3.0.7

  # UUID generation
  uuid: ^4.5.1

  # Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4

  # File Picker
  file_picker: ^8.1.6

  # Notifications
  local_notifier:
    path: packages/local_notifier

  # Desktop Integration
  window_manager: ^0.3.8
  hotkey_manager: ^0.2.3
  tray_manager: ^0.2.3
  screen_retriever: ^0.1.9
  desktop_drop: ^0.4.4

  # Image Caching
  cached_network_image: ^3.4.1

  # SVG & URL Launcher
  flutter_svg: ^2.0.16
  url_launcher: ^6.3.1

  # WebView for platform login
  webview_flutter: ^4.4.2
  webview_flutter_wkwebview: ^3.9.4

  # WebView2 for Windows browser (InAppWebView)
  flutter_inappwebview: ^6.1.0

  # Crypto
  crypto: ^3.0.3

  # Utils
  intl: any
  freezed_annotation: ^2.4.4

  # Archive extraction (for binary downloads)
  archive: ^3.6.1

  # App info (runtime version from native platform)
  package_info_plus: ^8.2.1

  # Error reporting & performance monitoring
  sentry_flutter: ^8.10.0
  qr_flutter: ^4.1.0

  # v2.1 Floating Capture: multi-window support (macOS/Windows/Linux)
  # Pinned to exact 0.3.0 (per audit P2-8) — plugin releases ~12-18 months
  # apart so manual review of new versions is preferred over auto-update.
  # Removal procedure if plugin abandoned: see docs/SSvid_v2_1_FloatingCapture_Spec.md §14.
  desktop_multi_window: 0.3.0

  # v2.1 Floating Capture: auto-launch on system login (per spec Q7 default ON)
  # By leanflutter (same maintainer as window_manager — active development)
  launch_at_startup: ^0.5.1

  # Brand-aware fonts (origin/main multi-brand support — see app_typography.dart).
  # Re-added during merge of feature branch with origin/main where this dep
  # was reintroduced. Floating capture's bundled-Inter optimization
  # (lib/core/theme — pre-merge) is superseded by this brand-aware approach.
  #
  # Pinned EXACT to 6.3.2 (no caret): google_fonts 6.3.3 bumped its sdk
  # constraint to dart ^3.9.0 / flutter >=3.35.0, but this project uses
  # Flutter 3.29.3 (Dart 3.7.2). With a caret constraint, `flutter pub
  # get` resolves to 6.3.3 which makes the lockfile incompatible with our
  # CI/dev SDK. Codex regression audit P1 on the floating-capture branch.
  google_fonts: 6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Mocking
  mocktail: ^1.0.4

  # Lints
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.2
  drift_dev: ^2.22.0
  ffigen: ^15.0.0
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # Icons
  flutter_launcher_icons: ^0.14.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/platforms/
    - assets/brands/ssvid/
    - assets/brands/vidcombo/
    - assets/translations/
    - assets/fonts/Inter-LICENSE.txt
    - assets/fonts/DMSans-LICENSE.txt

  # Fonts (per docs/SSvid_v2_Design_Spec.md §3.1)
  # SSvid uses Inter (Nocturne Cinematic — humanist + sharp terminals),
  # VidCombo uses DM Sans (Arctic Command — geometric + rounded). Both are
  # variable fonts so a single file covers every weight 100–1000 plus the
  # opsz (optical-size) axis.
  # License: SIL Open Font License for both
  # (see assets/fonts/Inter-LICENSE.txt and assets/fonts/DMSans-LICENSE.txt).
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/InterVariable.ttf
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSansVariable.ttf

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  image_path: "assets/images/logo.png"

  # macOS
  macos:
    generate: true
    image_path: "assets/images/logo.png"

  # Windows
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 256

  # Linux
  linux:
    generate: true
    image_path: "assets/images/logo.png"
