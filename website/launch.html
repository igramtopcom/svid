<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening SSvid...</title>
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://api.ssvid.app https://api.github.com;">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #f0f0f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: #1a1a24;
      border: 1px solid #2e2e3e;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
    }
    .logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #6C63FF, #a78bfa);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 28px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      color: #9090a8;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2e2e3e;
      border-top-color: #6C63FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 24px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .install-cta { display: none; }
    .install-cta h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #f0f0f5;
    }
    .install-cta p {
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #6C63FF, #a78bfa);
      color: #fff;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-secondary {
      display: inline-block;
      color: #9090a8;
      text-decoration: none;
      padding: 10px 20px;
      font-size: 14px;
      margin-top: 12px;
    }
    .btn-secondary:hover { color: #f0f0f5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">↓</div>

    <!-- Loading state -->
    <div id="loading">
      <h1>Opening SSvid...</h1>
      <p>Please wait while we launch the SSvid app.</p>
      <div class="spinner"></div>
    </div>

    <!-- Install CTA — shown if app not detected after 1.5s -->
    <div id="install-cta" class="install-cta">
      <h2>SSvid App Not Found</h2>
      <p>It looks like SSvid is not installed or not running on this computer.</p>
      <a href="/pricing.html" class="btn">Download SSvid — Free</a>
      <br>
      <a href="/" class="btn-secondary">Learn more →</a>
    </div>
  </div>

  <script src="launch.js?v=2026.04.14a"></script>
</body>
</html>
