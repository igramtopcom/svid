<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled — SSvid</title>
  <meta name="description" content="Your SSvid payment was cancelled. You can try again anytime.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16.png">
  <meta name="theme-color" content="#8D021F">
  <link rel="manifest" href="/manifest.json">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://api.ssvid.app https://api.github.com;">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <script>
    (function() {
      var stored = localStorage.getItem('ssvid-theme');
      if (stored) document.documentElement.setAttribute('data-theme', stored);
      else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
  <link rel="stylesheet" href="../styles.css?v=2026.04.14a">
  <link rel="preload" href="../fonts/inter-400-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="../fonts/manrope-700-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="../fonts/fonts.css">
  <style>
    .payment-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .payment-page .status-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .payment-page .status-icon.cancelled {
      background: var(--bg-surface-alt);
      color: var(--text-muted);
    }
    .payment-page h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 12px;
    }
    .payment-page .subtitle {
      font-size: 1.125rem;
      color: var(--text-secondary);
      margin-bottom: 32px;
      max-width: 440px;
      margin-left: auto;
      margin-right: auto;
    }
    .payment-page .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="payment-page">
    <div>
      <div class="status-icon cancelled" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
      <h1>Payment Cancelled</h1>
      <p class="subtitle">No worries — nothing was charged. You can upgrade anytime from within the app.</p>
      <div class="actions">
        <a href="/" class="btn btn-primary btn-lg">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Back to SSvid
        </a>
        <a href="/pricing" class="btn-text-link">View pricing plans</a>
        <a href="/account" class="btn-text-link">Manage existing subscription</a>
      </div>
    </div>
  </div>
</body>
</html>
