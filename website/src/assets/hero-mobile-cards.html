<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>SSvid Mobile Card Stack</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: transparent;
    width: 390px;
    height: 420px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-stack {
    position: relative;
    width: 340px;
    height: 400px;
  }

  .card {
    position: absolute;
    background: #1c1b1c;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    overflow: hidden;
    box-shadow: 0 30px 60px -15px rgba(141, 2, 31, 0.2), 0 10px 20px rgba(0,0,0,0.4);
  }

  /* Bottom card — Instagram Reel */
  .card-bottom {
    width: 260px;
    height: 320px;
    left: 10px;
    top: 60px;
    transform: rotate(-6deg);
    opacity: 0.35;
    z-index: 1;
  }

  .card-bottom .card-thumb {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.6);
  }

  .card-bottom .platform-badge {
    position: absolute;
    bottom: 16px;
    left: 16px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f9ce34, #ee2a7b, #6228d7);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-bottom .platform-badge .material-symbols-outlined {
    color: white;
    font-size: 18px;
  }

  /* Middle card — TikTok Converting */
  .card-middle {
    width: 270px;
    height: 340px;
    left: 60px;
    top: 30px;
    transform: rotate(3deg);
    opacity: 0.7;
    z-index: 2;
  }

  .card-middle .card-thumb {
    width: 100%;
    height: 260px;
    object-fit: cover;
    filter: brightness(0.7);
  }

  .card-middle .card-footer {
    padding: 12px 16px;
    background: linear-gradient(to top, #1c1b1c, rgba(28,27,28,0.95));
  }

  .card-middle .progress-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .card-middle .progress-icon {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #000;
    border: 1px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-middle .progress-icon .material-symbols-outlined {
    color: white;
    font-size: 14px;
  }

  .progress-bar-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    width: 45%;
    background: #C41E3A;
    border-radius: 2px;
  }

  .card-middle .progress-text {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Top card — YouTube Downloaded */
  .card-top {
    width: 300px;
    height: 280px;
    left: 20px;
    top: 0;
    transform: rotate(-1.5deg);
    z-index: 3;
  }

  .card-top .card-thumb-wrap {
    position: relative;
    width: 100%;
    height: 180px;
    overflow: hidden;
  }

  .card-top .card-thumb {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .card-top .yt-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #FF0000;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    color: white;
    text-transform: uppercase;
  }

  .card-top .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-top .play-btn {
    width: 48px;
    height: 48px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.2);
  }

  .card-top .play-btn .material-symbols-outlined {
    color: white;
    font-size: 28px;
  }

  .card-top .card-info {
    padding: 14px 16px;
  }

  .card-top .card-title {
    font-size: 14px;
    font-weight: 700;
    color: #e5e2e3;
    margin-bottom: 6px;
  }

  .card-top .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-top .meta-specs {
    font-size: 12px;
    color: #a8a5a6;
    font-weight: 500;
  }

  .card-top .meta-status {
    display: flex;
    align-items: center;
    gap: 4px;
    color: #27C93F;
  }

  .card-top .meta-status .material-symbols-outlined {
    font-size: 16px;
    font-variation-settings: 'FILL' 1;
  }

  .card-top .meta-status span:last-child {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="card-stack">
  <!-- Bottom card — Instagram -->
  <div class="card card-bottom">
    <img class="card-thumb" src="https://images.pexels.com/photos/3184291/pexels-photo-3184291.jpeg?auto=compress&cs=tinysrgb&w=400" alt="">
    <div class="platform-badge">
      <span class="material-symbols-outlined">play_arrow</span>
    </div>
  </div>

  <!-- Middle card — TikTok -->
  <div class="card card-middle">
    <img class="card-thumb" src="https://images.pexels.com/photos/3052361/pexels-photo-3052361.jpeg?auto=compress&cs=tinysrgb&w=400" alt="">
    <div class="card-footer">
      <div class="progress-row">
        <div class="progress-icon">
          <span class="material-symbols-outlined">music_note</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill"></div>
        </div>
      </div>
      <div class="progress-text">Converting: 45%</div>
    </div>
  </div>

  <!-- Top card — YouTube -->
  <div class="card card-top">
    <div class="card-thumb-wrap">
      <img class="card-thumb" src="https://images.pexels.com/photos/1629236/pexels-photo-1629236.jpeg?auto=compress&cs=tinysrgb&w=600" alt="">
      <div class="yt-badge">YouTube</div>
      <div class="play-overlay">
        <div class="play-btn">
          <span class="material-symbols-outlined">play_circle</span>
        </div>
      </div>
    </div>
    <div class="card-info">
      <div class="card-title">Beach Sunset Compilation</div>
      <div class="card-meta">
        <span class="meta-specs">1080p · 234 MB</span>
        <div class="meta-status">
          <span class="material-symbols-outlined">check_circle</span>
          <span>Downloaded</span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
