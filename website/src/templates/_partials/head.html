  <script>
    (function(){var s=localStorage.getItem('ssvid-theme');if(s)document.documentElement.setAttribute('data-theme',s);})();

  <style>
  :root{--color-primary:#8D021F;--color-primary-dark:#7A011A;--color-primary-light:#B71032;--color-primary-surface:#F9E5E7;--text-inverse:#fff;--font-heading:'Manrope','Plus Jakarta Sans','Inter',-apple-system,sans-serif;--font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;--radius-sm:4px;--radius-md:8px;--radius-lg:12px;--radius-xl:16px;--radius-full:9999px;--shadow-sm:0 1px 3px rgba(141,2,31,.04),0 1px 2px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(141,2,31,.05),0 2px 4px rgba(0,0,0,.04);--shadow-lg:0 10px 30px rgba(141,2,31,.06),0 4px 6px rgba(0,0,0,.03);--ease-out-expo:cubic-bezier(.16,1,.3,1);--transition:200ms var(--ease-out-expo);--section-padding:clamp(64px,8vw,120px)}
  [data-theme="light"]{--bg:#FAFAFA;--bg-surface:#FFF;--bg-surface-alt:#F3F3F3;--text:#1A1C1C;--text-secondary:#594140;--text-muted:#8D706F;--border:rgba(225,190,189,.25);--border-light:rgba(225,190,189,.12)}
  [data-theme="dark"]{--bg:#131313;--bg-surface:#1C1B1B;--bg-surface-alt:#2A2A2A;--text:#E5E2E1;--text-secondary:#A88989;--text-muted:#594140;--border:rgba(89,65,64,.15);--border-light:rgba(89,65,64,.08)}
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth;scroll-padding-top:80px}
  body{font-family:var(--font-family);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}img{max-width:100%;display:block}
  h1,h2,h3{font-family:var(--font-heading);letter-spacing:-.02em;text-wrap:balance}
  .container{max-width:1120px;margin:0 auto;padding:0 24px}
  .navbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.8);border-bottom:1px solid var(--border-light);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
  [data-theme="dark"] .navbar{background:rgba(19,19,19,.8)}
  .nav-container{display:flex;align-items:center;justify-content:space-between;height:64px}
  .nav-logo{display:flex;align-items:center;gap:10px;font-size:1.25rem;font-weight:700}
  .nav-links{display:flex;gap:32px}.nav-links a{font-size:.9375rem;font-weight:500;color:var(--text-secondary)}
  .nav-actions{display:flex;align-items:center;gap:12px}
  .hero{padding:120px 0 80px;overflow:hidden;position:relative}
  .skip-link{position:absolute;top:-100%;left:16px;z-index:10000}
  @media(max-width:768px){.nav-links{display:none}.hero{padding:100px 0 60px}}
  </style>

  <!-- Preconnect for API calls -->

  <!-- Fonts: self-hosted, non-blocking load with preload for key weights -->

  <link rel="preload" href="/fonts/manrope-700-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/fonts/fonts.css">
  <link rel="dns-prefetch" href="https://api.ssvid.app">

  <!-- Speculation Rules: prerender high-intent pages -->
  <script type="speculationrules">
  {
    "prerender": [
      { "source": "list", "urls": ["/download/macos", "/download/windows", "/download/linux"] }
    ],
    "prefetch": [
      { "source": "document", "where": { "and": [{ "href_matches": "/*" }, { "not": { "selector_matches": "[rel~=nofollow]" } }] }, "eagerness": "moderate" }
    ]
  }
  </script>
